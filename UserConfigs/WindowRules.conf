# WINDOWRULE v2
# windowrule v2 - position
# windowrule = center,floating:1 # warning, it cause even the menu to float and center.
#windowrule = center, match:class ([Tt]hunar), match:title (File Operation Progress)
#windowrule = center, match:class ([Tt]hunar), match:title (Confirm to replace files)

# windowrule v2 to avoid idle for fullscreen apps
windowrule {
  name = windowrule-1
  idle_inhibit = fullscreen
  match:fullscreen = 1
}


# windowrule v2 move to workspace
# windowrule = workspace 1, float 1, match:class ^([Oo]bsidian)$
windowrule {
    name = sublime_workspace
    match:class = ^([Ss]ublime_text)$
    workspace = 1
}
windowrule {
    name = sublime_workspace
    match:class = ^(org.telegram.desktop)$
    workspace = 1
}
windowrule {
    name = firerox_rule 
    match:class = ^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr)$
    workspace = 2
}
windowrule {
    name = lutris_rule
    match:class = ^(net.lutris.Lutris)$
    workspace = 10
}
windowrule {
    name = bottles_rule
    match:class = ^(com.usebottles.bottles)$
    workspace = 10
}
windowrule {
    name = firefox_subwindows
    match:class = ^firefox$
    match:title = ^(Library)$
    float = 1
}
#windowrule = workspace 9, match:class ^([Ss]team)$

# windowrule v2 move to workspace (silent)
#windowrule = workspace 6 silent, match:class ^(virt-manager)$

# windowrule v2 - float
windowrule = float 1, match:class ^(org.kde.polkit-kde-authentication-agent-1)$ 
windowrule = float 1, match:class ([Zz]oom|onedriver|onedriver-launcher)$
#windowrule = float 1, match:class ([Tt]hunar), match:title (File Operation Progress)
#windowrule = float 1, match:class ([Tt]hunar), match:title (Confirm to replace files)
windowrule = float 1, match:class (xdg-desktop-portal-gtk)
windowrule = float 1, match:class (org.gnome.Calculator), match:title (Calculator)
windowrule = float 1, match:class (codium|codium-url-handler|VSCodium), match:title (Add Folder to Workspace)
windowrule = float 1, match:class ^([Rr]ofi)$
windowrule = float 1, match:class ^(eog)$
windowrule = float 1, match:class ^(pavucontrol|org.pulseaudio.pavucontrol)$
#windowrule = float 1, match:class ^(nwg-look|qt5ct|qt6ct|mpv)$
windowrule = float 1, match:class ^(nm-applet|nm-connection-editor|blueman-manager)$
windowrule = float 1, match:class ^(gnome-system-monitor|org.gnome.SystemMonitor)$ # system monitor
windowrule = float 1, match:class ^(yad)$ # icon browser
windowrule = float 1, match:class ^(wihotspot-gui)$ # wifi hotspot
windowrule = float 1, match:class ^(evince)$ # document viewer
windowrule = float 1, match:class ^(file-roller|org.gnome.FileRoller)$ # archive manager
windowrule = float 1, match:class ^([Bb]aobab|org.gnome.[Bb]aobab)$ # Disk usage analyzer
windowrule = float 1, match:title (Kvantum Manager)
